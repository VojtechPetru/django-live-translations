name: CI
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        django-version: ["4.2", "5.0", "5.1", "5.2", "6.0"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]" ${{ matrix.django-version != 'latest' && format('django=={0}.*', matrix.django-version) || '' }}
      - run: pytest tests/unit

  e2e-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [po, db]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[e2e]"
      - run: playwright install --with-deps chromium
      - run: pytest tests/e2e --backend=${{ matrix.backend }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,e2e]"
      - run: playwright install --with-deps chromium
      - run: pytest tests/unit --cov=live_translations --cov-branch -q
      - run: pytest tests/e2e --backend=both --cov=live_translations --cov-branch --cov-append -q
      - run: coverage report --fail-under=90
      - run: coverage json -o coverage.json
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.json

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pyrefly check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check
      - run: ruff format --check
