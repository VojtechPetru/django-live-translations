name: CI
on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "site/**"
      - "*.md"
      - "zensical.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "site/**"
      - "*.md"
      - "zensical.toml"
      - ".github/workflows/docs.yml"

jobs:
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        django-version: ["4.2", "5.0", "5.1", "5.2", "6.0"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]" ${{ matrix.django-version != 'latest' && format('django=={0}.*', matrix.django-version) || '' }}
      - run: pytest tests/unit

  coverage:
    needs: [lint, type-check, unit-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit --cov=live_translations --cov-branch -q
      - run: coverage report
      - run: coverage json -o coverage.json
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.json

  e2e-test:
    needs: [coverage]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [po, db]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[e2e]"
      - run: playwright install --with-deps chromium
      - run: pytest tests/e2e --backend=${{ matrix.backend }} -q

  benchmark:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[bench]"
      - run: pytest tests/benchmarks/test_overhead_ci.py -v -s --benchmark-disable

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pyrefly check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check
      - run: ruff format --check
