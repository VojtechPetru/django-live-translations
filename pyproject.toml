[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "django-live-translations"
version = "0.1.0"
description = "In-browser translation editing for Django superusers"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "django>=4.2",
    "polib>=1.2",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-django",
    "ruff",
]

[tool.hatch.build.targets.wheel]
packages = ["src/live_translations"]
