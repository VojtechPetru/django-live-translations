[project]
site_name = "django-live-translations"
site_url = "https://vojtechpetru.github.io/django-live-translations/"
site_description = "In-browser translation editing for Django"
repo_url = "https://github.com/vojtechpetru/django-live-translations"
repo_name = "vojtechpetru/django-live-translations"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Configuration" = "configuration.md" },
  { "Editing Translations" = "editing.md" },
  { "Backends" = "backends.md" },
  { "Permissions" = "permissions.md" },
  { "Django Admin" = "admin.md" },
  { "Import & Export" = "import-export.md" },
  { "How It Works" = "how-it-works.md" },
  { "Troubleshooting" = "troubleshooting.md" },
]

extra_css = ["assets/extra.css"]

[project.theme]
features = [
  "navigation.instant",
  "navigation.tracking",
  "navigation.top",
  "navigation.path",
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
]

[project.theme.palette]
scheme = "slate"
primary = "indigo"
accent = "indigo"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.def_list]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.blocks.caption]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
